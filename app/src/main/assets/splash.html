<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title></title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  html, body {
    width: 100%;
    height: 100%;
    background: #000000;
    overflow: hidden;
    overscroll-behavior: none;
  }
  
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 0.6s ease-out forwards;
    user-select: none;
    -webkit-user-select: none;
  }
  
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  
  .logo-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .logo {
    width: 200px;
    height: auto;
    display: block;
    will-change: transform, filter;
    transform-origin: center center;
    animation: breathe 2.4s ease-in-out infinite;
    filter: 
      drop-shadow(0 0 20px rgba(0, 229, 255, 0.85))
      drop-shadow(0 0 40px rgba(255, 0, 170, 0.7))
      drop-shadow(0 0 60px rgba(123, 47, 255, 0.6));
  }
  
  .logo::after {
    content: '';
    position: absolute;
    inset: -20px;
    z-index: -1;
    opacity: 0;
    animation: glowCycle 2.4s ease-in-out infinite;
  }
  
  @media (min-width: 768px) {
    .logo {
      width: 280px;
    }
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes breathe {
    0%, 100% { 
      transform: scale(1); 
    }
    50% { 
      transform: scale(1.05); 
    }
  }
  
  @keyframes glowCycle {
    0%, 100% {
      filter: 
        drop-shadow(0 0 20px rgba(0, 229, 255, 0.9))
        drop-shadow(0 0 40px rgba(255, 0, 170, 0.65))
        drop-shadow(0 0 60px rgba(123, 47, 255, 0.55));
    }
    33% {
      filter: 
        drop-shadow(0 0 22px rgba(0, 229, 255, 0.65))
        drop-shadow(0 0 44px rgba(255, 0, 170, 0.9))
        drop-shadow(0 0 66px rgba(123, 47, 255, 0.5));
    }
    66% {
      filter: 
        drop-shadow(0 0 24px rgba(0, 229, 255, 0.6))
        drop-shadow(0 0 42px rgba(255, 0, 170, 0.6))
        drop-shadow(0 0 70px rgba(123, 47, 255, 0.9));
    }
  }
  
  .logo {
    animation: breathe 2.4s ease-in-out infinite, glowCycle 2.4s ease-in-out infinite;
  }
</style>
</head>
<body>
  <canvas id="particles"></canvas>
  
  <div class="logo-wrap">
    <img src="logo.svg" alt="" class="logo" draggable="false">
  </div>

<script>
  (function() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d', { alpha: true });
    let particles = [];
    const PARTICLE_COUNT = 40;
    const colors = ['#00E5FF', '#FF00AA', '#FFFFFF'];
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let width = window.innerWidth;
    let height = window.innerHeight;
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }
    
    function createParticles() {
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height + Math.random() * height * 0.3,
          size: 1.5 + Math.random() * 1.5,
          vx: (Math.random() - 0.5) * 0.25,
          vy: 0.18 + Math.random() * 0.38,
          color: colors[Math.floor(Math.random() * colors.length)],
          alpha: 0.3 + Math.random() * 0.7,
          phase: Math.random() * Math.PI * 2,
          speed: 0.008 + Math.random() * 0.015
        });
      }
    }
    
    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        
        p.y -= p.vy;
        p.x += p.vx;
        p.phase += p.speed;
        
        const twinkle = 0.4 + Math.sin(p.phase) * 0.6;
        const alpha = p.alpha * twinkle;
        
        if (p.y < -10) {
          p.y = height + 10;
          p.x = Math.random() * width;
        }
        if (p.x < -10) p.x = width + 10;
        if (p.x > width + 10) p.x = -10;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha * 0.9;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = p.size > 2 ? 10 : 6;
        ctx.fill();
      }
      
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      
      requestAnimationFrame(animate);
    }
    
    resize();
    createParticles();
    animate();
    
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        resize();
        createParticles();
      }, 150);
    }, { passive: true });
    
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        resize();
      }
    });
  })();
</script>
</body>
</html>
